x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    COS_SECRET_ID: ${COS_SECRET_ID}
    COS_SECRET_KEY: ${COS_SECRET_KEY}
    COS_BUCKET: ${COS_BUCKET}
    COS_REGION: ${COS_REGION}
    NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://postgres:postgres@db:5432/trae_demo_wall?schema=public&connection_limit=30&pool_timeout=20&connect_timeout=10
  DIRECT_URL: postgresql://postgres:postgres@db:5432/trae_demo_wall
  REDIS_URL: redis://redis:6379
  COS_SECRET_ID: ${COS_SECRET_ID}
  COS_SECRET_KEY: ${COS_SECRET_KEY}
  COS_BUCKET: ${COS_BUCKET}
  COS_REGION: ${COS_REGION}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  NEXTAUTH_URL: ${NEXTAUTH_URL}
  AUTH_TRUST_HOST: "true"

x-app-service: &app-service
  build: *app-build
  environment:
    <<: *app-env
    RUN_DB_INIT: "false"
  depends_on:
    app-init:
      condition: service_completed_successfully
  restart: unless-stopped
  networks:
    - trae-network
  cpus: 0.75
  mem_limit: 2g
  deploy:
    resources:
      limits:
        cpus: "0.75"
        memory: 2G

services:
  nginx-lb:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-lb-2.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
    restart: unless-stopped
    networks:
      - trae-network
    cpus: 0.25
    mem_limit: 256m
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  app-init:
    build: *app-build
    environment:
      <<: *app-env
      RUN_DB_INIT: "true"
      START_SERVER: "false"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    restart: "no"
    networks:
      - trae-network

  app-1:
    <<: *app-service

  app-2:
    <<: *app-service

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trae_demo_wall
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - trae-network
    cpus: 0.5
    mem_limit: 2560m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2560M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - trae-network
    cpus: 0.25
    mem_limit: 768m
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 768M

volumes:
  postgres-data:
  redis-data:

networks:
  trae-network:
    driver: bridge
